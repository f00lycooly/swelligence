get_overview:
  name: Get conditions overview
  description: >-
    Return a ranked overview for the dashboard cards: current scores, 7-day
    go-worthy sessions, and each day's preference-ranked top-3 podium. Optionally
    restrict to given spots/sports (the podium is recomputed for that subset).
  fields:
    spots:
      name: Spots
      description: Restrict to these spot names (empty = all).
      required: false
      example: ["Hurst Spit / Keyhaven"]
      selector:
        text:
          multiple: true
    sports:
      name: Sports
      description: Restrict to these sport keys (empty = all).
      required: false
      example: ["kitesurf", "wingfoil"]
      selector:
        text:
          multiple: true
    priority:
      name: Sport priority
      description: >-
        Sport keys most-wanted first. Nudges the podium ranking so favourites
        surface when scores are close. Supplied by the card (drag to reorder);
        empty falls back to the entry's enabled-sports order.
      required: false
      example: ["kitesurf", "wingfoil", "surf"]
      selector:
        text:
          multiple: true

get_forecast:
  name: Get suitability forecast
  description: >-
    Return the suitability forecast for one or more Swelligence suitability
    sensors (mirrors weather.get_forecasts). Use type 'hourly' for the full
    timeline or 'daily' for each day's best window.
  fields:
    entity_id:
      name: Suitability sensor(s)
      description: One or more swelligence suitability sensors to forecast.
      required: true
      selector:
        entity:
          integration: swelligence
          domain: sensor
          multiple: true
    type:
      name: Forecast type
      description: Hourly timeline or one entry per day (that day's best window).
      required: false
      default: daily
      selector:
        select:
          options:
            - hourly
            - daily

get_spot_detail:
  name: Get spot detail
  description: >-
    Return per-spot now/week detail for the spot-detail Lovelace card: now
    conditions, tide state (high/low/rising/falling + next event), the next-24h
    hourly suitability series, and the daytime daily outlook (each day's peak
    with peak-hour conditions + tide), for every sport at the spot. Optionally
    restrict to given spots/sports.
  fields:
    spots:
      name: Spots
      description: Restrict to these spot names (empty = all).
      required: false
      example: ["Southbourne"]
      selector:
        text:
          multiple: true
    sports:
      name: Sports
      description: Restrict to these sport keys (empty = all).
      required: false
      example: ["surf", "kitesurf"]
      selector:
        text:
          multiple: true
