name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements-test.txt
      - run: pytest

  ha-guard:
    name: HA import & schema guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements-ha-test.txt
      # Real Home Assistant import + flow-schema guard (catches what the stubbed
      # suite in tests/ cannot). Kept as a separate tree/job from the pure tests.
      - run: pytest tests_ha -o asyncio_mode=auto

  # hassfest is NOT run here. It is a Docker container action that bind-mounts
  # ${{ github.workspace }} into a sibling container via the host daemon; the
  # Forgejo `act_runner` always executes jobs inside a container, so the
  # workspace is a docker *volume* and the bind-mount sees an empty host path —
  # hassfest then reports "No integrations found!". A `tinkernet-host` runner
  # label did not change this (act_runner still containerises the job). Since
  # release.yml runs hassfest authoritatively on every tag on the GitHub mirror
  # (ubuntu-latest, where the bind-mount works), the duplicate here only ever
  # produced a false red. HACS validation likewise runs in release.yml on GitHub
  # (hacs/action returns 401 against Forgejo).
