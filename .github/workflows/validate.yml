name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements-test.txt
      - run: pytest

  ha-guard:
    name: HA import & schema guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements-ha-test.txt
      # Real Home Assistant import + flow-schema guard (catches what the stubbed
      # suite in tests/ cannot). Kept as a separate tree/job from the pure tests.
      - run: pytest tests_ha -o asyncio_mode=auto

  hassfest:
    name: Hassfest
    # Forgejo-only: the `tinkernet-host` runner exists on this Forgejo instance,
    # not on the GitHub mirror. On GitHub this job is skipped — release.yml runs
    # hassfest there on ubuntu-latest instead (no container-workspace issue on
    # GitHub-hosted runners), and the push mirror would otherwise leave this job
    # queued forever against a runner label GitHub doesn't have.
    if: ${{ !contains(github.server_url, 'github.com') }}
    # Host-mode (tinkernet-host), not ubuntu-latest: hassfest is a Docker
    # container action that bind-mounts ${{ github.workspace }} into a sibling
    # container via the host daemon. In a containerised (ubuntu-latest) job the
    # workspace is a docker *volume*, so the host path is empty and hassfest
    # reports "No integrations found!". Host-mode gives it a real host workspace.
    runs-on: tinkernet-host
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  # HACS validation runs in release.yml (tag-triggered, on the GitHub mirror)
  # where hacs/action can reach the GitHub API. It returns 401 against Forgejo,
  # so it is intentionally not part of this push/PR validation here.
