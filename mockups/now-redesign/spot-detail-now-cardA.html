<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Swelligence · Spot Detail — NOW</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
*{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:'Hanken Grotesk',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;-webkit-font-smoothing:antialiased;}

  /* ---------- the 720 card ---------- */
  .card720{width:720px;height:720px;background:#0b2935;border-radius:20px;border:1px solid rgba(150,200,210,.16);
    box-shadow:0 30px 70px -30px rgba(0,0,0,.8);overflow:hidden;padding:16px;display:flex;flex-direction:column;gap:10px;
    --ac:#36c9d6;--ink:#eaf4f5;--mut:#8ba4b3;--dim:rgba(139,164,179,.62);--line:rgba(150,200,210,.16);
    --panel:rgba(255,255,255,.045);--panel2:rgba(255,255,255,.065);--raise:rgba(255,255,255,.1);
    color:var(--ink);font-variant-numeric:tabular-nums;line-height:1;}
  .ic{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;display:block;}
  .ringsvg{width:100%;height:100%;display:block;transform:rotate(-90deg);}
  .ringsvg .rt{fill:none;stroke:color-mix(in srgb,var(--mut) 26%,transparent);}
  .ringsvg .ra{fill:none;stroke-linecap:round;transition:stroke-dashoffset .18s ease,stroke .18s ease;}
  .cmp{display:block;} .cmp-d{fill:rgba(0,0,0,.28);stroke:rgba(255,255,255,.2);stroke-width:1.5;}
  .cmp-n{fill:var(--mut);font-size:11px;text-anchor:middle;font-family:inherit;font-weight:700;}
  .needle{transition:transform .2s ease;}

  /* header */
  .hdr{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .hid{display:flex;align-items:center;gap:10px;min-width:0;}
  .logo{width:40px;height:40px;border-radius:11px;flex:0 0 auto;display:grid;place-items:center;font-weight:800;font-size:19px;color:#04201c;background:radial-gradient(circle at 35% 30%,var(--ac),color-mix(in srgb,var(--ac) 52%,#000));}
  .hnm{font-size:21px;font-weight:800;line-height:1.05;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .hsub{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--mut);margin-top:4px;}
  .hsub b{color:var(--ac);}
  .hctrl{display:flex;align-items:center;gap:12px;flex:0 0 auto;}
  .hnow{display:flex;align-items:center;gap:7px;text-align:right;}
  .hnow b{display:block;font-size:16px;font-weight:800;line-height:1;}
  .hnow span{font-size:8.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--ac);}
  .pulse{width:8px;height:8px;border-radius:50%;background:var(--ac);animation:pl 2.4s infinite;}
  @keyframes pl{0%{box-shadow:0 0 0 0 color-mix(in srgb,var(--ac) 50%,transparent)}70%{box-shadow:0 0 0 8px transparent}100%{box-shadow:0 0 0 0 transparent}}
  .seg{display:flex;border:1px solid color-mix(in srgb,var(--mut) 35%,transparent);border-radius:10px;overflow:hidden;}
  .seg button{font:inherit;cursor:pointer;border:0;background:transparent;color:var(--mut);font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:8px 13px;}
  .seg button.on{background:var(--ac);color:#04201c;}

  /* sport medallions */
  .sports{flex:0 0 auto;display:grid;grid-auto-flow:column;grid-auto-columns:1fr;gap:7px;}
  .med{font:inherit;cursor:pointer;background:transparent;border:1px solid transparent;border-radius:13px;padding:5px 2px;display:flex;flex-direction:column;align-items:center;gap:4px;color:inherit;}
  .med.on{border-color:var(--ac);background:color-mix(in srgb,var(--ac) 10%,transparent);}
  .med-r{position:relative;width:50px;height:50px;}
  .med-i{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;}
  .med-i .ic{width:13px;height:13px;color:var(--mut);}
  .med.on .med-i .ic{color:var(--ink);}
  .med-i span{font-weight:800;font-size:14px;line-height:1;}
  .med-l{font-size:10px;font-weight:600;color:var(--mut);}
  .med.on .med-l{color:var(--ink);}

  /* body shell */
  .body{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;gap:8px;}
  .ch-h{display:flex;align-items:baseline;justify-content:space-between;}
  .ch-h .k{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.13em;color:var(--mut);}
  .ch-h .hint{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--ac);display:flex;align-items:baseline;gap:6px;}
  .ch-h .hint b{color:var(--ink);font-weight:800;font-size:15px;letter-spacing:0;}

  /* spot tabs */
  .tabs{flex:0 0 auto;display:grid;grid-auto-flow:column;grid-auto-columns:1fr;gap:9px;}
  .tab{font:inherit;cursor:pointer;color:inherit;text-align:left;border-radius:13px;padding:9px 12px;display:flex;flex-direction:column;gap:4px;background:var(--panel2);border:1px solid var(--line);}
  .tab.on{border-color:var(--ac);background:color-mix(in srgb,var(--ac) 12%,transparent);box-shadow:0 0 0 1px color-mix(in srgb,var(--ac) 30%,transparent);}
  .tab .tn{font-size:14px;font-weight:800;display:flex;align-items:center;gap:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tab .tdot{width:8px;height:8px;border-radius:50%;background:var(--mut);flex:0 0 auto;}
  .tab.on .tdot{background:var(--ac);box-shadow:0 0 8px var(--ac);}
  .tab .tw{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--mut);display:flex;justify-content:space-between;gap:8px;}
  .tab .tw b{font-size:13px;color:var(--ink);}

  /* ============ VARIANT A — scrubber (developed) ============ */
  .sc-hero{flex:0 0 auto;display:grid;grid-template-columns:230px 1fr;gap:10px;height:212px;}
  .sc-map{position:relative;border-radius:14px;overflow:hidden;border:1px solid var(--line);background:var(--panel2);}
  .lmap{position:absolute;inset:0;overflow:hidden;}
  .mos{position:absolute;left:50%;top:50%;width:768px;height:768px;}
  .mos img{position:absolute;width:256px;height:256px;display:block;}
  .lmap.dark .mos{filter:invert(1) hue-rotate(180deg) brightness(.82) contrast(.95) saturate(.65);}
  .vign{position:absolute;inset:0;pointer-events:none;box-shadow:inset 0 0 44px 6px rgba(0,0,0,.5);}
  .sc-cmp{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);pointer-events:none;filter:drop-shadow(0 2px 6px rgba(0,0,0,.55));}
  .wband{position:absolute;left:0;right:0;bottom:0;padding:18px 12px 9px;pointer-events:none;background:linear-gradient(0deg,rgba(0,0,0,.78),transparent);}
  .wfrom{font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#fff;}
  .wfrom span{color:var(--ac);}
  .wxy{font-size:11px;font-weight:600;color:rgba(255,255,255,.85);margin-top:3px;}
  .wxy i{font-style:normal;font-weight:800;color:#fff;}
  .sc-readcol{display:flex;flex-direction:column;gap:9px;min-width:0;}
  .sc-read{flex:0 0 auto;display:grid;grid-template-columns:repeat(3,1fr);background:var(--panel2);border:1px solid var(--line);border-radius:14px;overflow:hidden;}
  .sc-cell{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;padding:12px 6px;min-width:0;}
  .sc-cell + .sc-cell{border-left:1px solid var(--line);}
  .sc-cell-k{font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);}
  .scorering{position:relative;width:78px;height:78px;}
  .sc-num{position:absolute;inset:0;display:grid;place-items:center;font-size:25px;font-weight:800;}
  .sc-kit{display:flex;flex-direction:column;align-items:center;gap:0;}
  .kit-svg{width:104px;height:50px;}
  .kit-track{fill:none;stroke:color-mix(in srgb,var(--mut) 26%,transparent);stroke-width:9;stroke-linecap:round;}
  .kit-needle{stroke:var(--ink);stroke-width:2.5;stroke-linecap:round;} .kit-hub{fill:var(--ink);}
  .kit-meta{display:flex;flex-direction:column;align-items:center;gap:1px;margin-top:-6px;}
  .kit-meta b{font-size:16px;font-weight:800;line-height:1;}
  .kit-meta span{font-size:8.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--mut);}
  .bestp{display:flex;flex-direction:column;align-items:center;gap:2px;justify-content:center;height:78px;}
  .bestp .bp-k{font-size:9.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--mut);}
  .bestp b{font-size:15px;font-weight:800;}
  .sc-safety{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;height:78px;}
  .safety-ph{width:60px;height:60px;}
  .safety-ph circle{fill:none;stroke:color-mix(in srgb,var(--mut) 42%,transparent);stroke-width:2;stroke-dasharray:4 5;}
  .ph-note{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:8.5px;font-weight:600;letter-spacing:.03em;color:var(--dim);text-transform:uppercase;text-align:center;line-height:1.25;}
  .sc-facs{flex:1 1 auto;min-height:0;display:grid;grid-template-columns:1fr 1fr;column-gap:22px;align-content:space-evenly;background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:6px 16px;}
  .fac{display:grid;grid-template-columns:62px 1fr auto;align-items:center;gap:9px;}
  .fac-l{font-size:10.5px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.04em;}
  .fac-bar{height:7px;border-radius:4px;background:color-mix(in srgb,var(--mut) 16%,transparent);overflow:hidden;}
  .fac-bar i{display:block;height:100%;border-radius:4px;transition:width .15s ease,background .15s ease;}
  .fac-v{font-size:11px;font-weight:800;color:var(--ink);text-align:right;white-space:nowrap;}
  .chartwrap{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;gap:7px;}
  .chart{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;gap:7px;overflow:visible;}
  .daylane{flex:0 0 50px;position:relative;border-radius:8px;overflow:hidden;border:1px solid var(--line);}
  .dl-lbl{position:absolute;left:9px;top:50%;transform:translateY(-50%);z-index:2;font-size:9px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:rgba(255,255,255,.9);pointer-events:none;text-shadow:0 1px 3px rgba(0,0,0,.85);}
  .dl-t{position:absolute;bottom:5px;z-index:2;transform:translateX(-50%);font-size:8.5px;font-weight:700;color:rgba(255,255,255,.9);pointer-events:none;white-space:nowrap;text-shadow:0 1px 2px rgba(0,0,0,.7);}
  .sky{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;}
  .sky-horizon{stroke:rgba(255,255,255,.22);stroke-width:1;stroke-dasharray:3 4;vector-effect:non-scaling-stroke;}
  .sky-line{fill:none;stroke:rgba(255,233,180,.85);stroke-width:1.75;stroke-linejoin:round;vector-effect:non-scaling-stroke;}
  .sky-tick{stroke:rgba(255,255,255,.28);stroke-width:1;vector-effect:non-scaling-stroke;}
  .sunmark{position:absolute;transform:translate(-50%,-50%);font-size:16px;line-height:1;pointer-events:none;color:#ffe08a;filter:drop-shadow(0 0 5px rgba(255,210,120,.9));z-index:3;transition:left .12s ease,top .12s ease;}
  .sunmark.night{color:#cdd7ea;filter:drop-shadow(0 0 5px rgba(170,200,240,.7));}
  .barwrap{flex:1 1 auto;min-height:0;position:relative;background:linear-gradient(180deg,transparent,color-mix(in srgb,var(--mut) 8%,transparent));border-radius:8px;}
  .bars{position:absolute;inset:0;display:flex;align-items:flex-end;gap:2px;z-index:1;}
  .bar{flex:1;height:var(--h);min-height:4px;background:var(--c);border:0;border-radius:3px 3px 0 0;opacity:.5;padding:0;cursor:pointer;transition:opacity .12s;align-self:flex-end;}
  .bar.sel{opacity:1;outline:2px solid var(--ink);outline-offset:1px;}
  .bar.now::after{content:"";position:absolute;}
  .axis{flex:0 0 auto;display:flex;padding:0 4px;}
  .axis span{flex:1;text-align:center;font-size:9px;font-weight:700;color:var(--dim);}

  /* standalone host: centre the 720 card */
  html,body{height:100%;}
  body{display:grid;place-items:center;background:#06141b;padding:16px;}
  #card{width:720px;height:720px;}
</style>
</head>
<body>
  <svg width="0" height="0" style="position:absolute"><defs id="sw-defs"></defs></svg>
  <div id="card"></div>

<script>
/* ============================================================================
   Swelligence — shared data harness + helpers for the NOW-view redesign study.

   Re-uses the SHIPPED card's verdict palette, sport icons, compass + format
   helpers verbatim, and the same dummy spots (Hurst / Avon / Sandbanks).

   KEY CHANGE vs the shipped harness: a per-hour MET series drives a per-hour
   FACTOR breakdown -> SCORE -> KIT recommendation through one small physical
   model (SPORT_MODEL). The production get_spot_detail returns exactly this
   per-hour shape; the old harness only kept a per-hour score, which is why the
   factor bars / kit arc could only ever show "now" and the timeline was static.
   Now every element follows the scrub coherently.
   ========================================================================== */
(function () {
  const VERDICT = {
    epic: { c: "#1f9d57", t: "#fff" }, great: { c: "#5cb85c", t: "#08230f" },
    good: { c: "#9bcf5f", t: "#0c2208" }, marg: { c: "#f0a83d", t: "#241600" },
    poor: { c: "#e8593a", t: "#fff" },
  };
  const LABELS = { kitesurf: "Kite", windsurf: "Windsurf", wingfoil: "Wing", surf: "Surf", sup: "SUP", sailing: "Sail", seaswim: "Swim" };
  const SYM = { kitesurf: "i-kite", windsurf: "i-windsurf", wingfoil: "i-wing", surf: "i-surf", sup: "i-sup", sailing: "i-sail", seaswim: "i-swim" };
  const COMPASS16 = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];

  const vc = (v) => (VERDICT[v] || VERDICT.poor).c;
  const vkey = (v) => (v === "marginal" ? "marg" : v);
  const vcw = (v) => vc(vkey(v) in VERDICT ? vkey(v) : "poor");
  const cardOf = (deg) => (deg == null ? null : COMPASS16[Math.round(((deg % 360) / 22.5)) % 16]);
  const f1 = (n, d = 1) => (n == null ? "—" : Math.round(n * 10 ** d) / 10 ** d);
  const cap = (s) => (s ? s[0].toUpperCase() + s.slice(1) : "—");
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
  const vword = (s) => s >= 85 ? "epic" : s >= 70 ? "great" : s >= 55 ? "good" : s >= 35 ? "marginal" : "poor";
  const facCol = (n) => (n == null ? "var(--mut)" : n >= 67 ? vc("good") : n >= 34 ? vc("marg") : vc("poor"));

  const ICON_DEFS = `
<symbol id="i-kite" viewBox="0 0 24 24"><path d="M2.5 7 Q12 1 21.5 7"/><path d="M5.5 7.6 L11 15.5"/><path d="M18.5 7.6 L13 15.5"/><path d="M10.5 15.6 H13.5"/><path d="M7 20 Q12 22.5 17 20"/></symbol>
<symbol id="i-windsurf" viewBox="0 0 24 24"><path d="M3 19.5 Q12 22.5 21 19.5"/><path d="M12 19 L12 3.5"/><path d="M12 4 Q20 9.5 12 15"/><path d="M12 9.5 L17.5 9"/></symbol>
<symbol id="i-wing" viewBox="0 0 24 24"><path d="M3.5 8 Q12 2.5 20.5 8 Q12 10.5 3.5 8 Z"/><path d="M12 10.5 L12 16"/><path d="M7.5 17.5 Q12 15.5 16.5 17.5"/></symbol>
<symbol id="i-surf" viewBox="0 0 24 24"><path d="M2 17 C6 17 6 9 11 9 C15.5 9 14 15 19.5 14"/><path d="M11 9 C13.5 7.8 14.6 10 12.4 11.6"/><path d="M13.5 20 L20 13.5"/></symbol>
<symbol id="i-sup" viewBox="0 0 24 24"><path d="M3 18 Q12 21 21 18"/><path d="M3 18 Q12 15.6 21 18"/><path d="M14.5 3.5 L9 17"/><path d="M13 3.5 H16"/><path d="M7.5 16 L9 19 L10.7 16 Z"/></symbol>
<symbol id="i-sail" viewBox="0 0 24 24"><path d="M4 18 L20 18 L17.5 21 H6.5 Z"/><path d="M12 18 L12 3.5"/><path d="M12.8 5 L18.5 16 H12.8 Z"/><path d="M11.2 6.5 L6 16 H11.2 Z"/></symbol>
<symbol id="i-swim" viewBox="0 0 24 24"><circle cx="8" cy="8.5" r="2"/><path d="M9.6 10 Q14 8.4 17.5 11.5"/><path d="M9.6 10 Q11.5 5.5 15 7.5"/><path d="M2 18 q2.6 -2 5.2 0 t5.2 0 t5.2 0"/></symbol>`;
  const ICON = (sport, cls = "") => `<svg class="ic ${cls}"><use href="#${SYM[sport] || "i-kite"}"/></svg>`;

  function ring(score, col, size = 80, sw = 8) {
    const r = size / 2 - sw, circ = 2 * Math.PI * r, off = circ * (1 - (score || 0) / 100);
    return `<svg class="ringsvg" viewBox="0 0 ${size} ${size}" data-r="${r}" data-sz="${size}">
      <circle class="rt" cx="${size/2}" cy="${size/2}" r="${r}" style="stroke-width:${sw}"/>
      <circle class="ra" cx="${size/2}" cy="${size/2}" r="${r}" stroke="${col}" style="stroke-width:${sw}"
        stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"/></svg>`;
  }
  function compass(dir, col, size = 64) {
    const rot = ((dir ?? 0) + 180) % 360;
    return `<svg class="cmp" viewBox="0 0 100 100" width="${size}" height="${size}">
      <g transform="translate(50 50)"><circle r="40" class="cmp-d"/>
      <text x="0" y="-29" class="cmp-n">N</text>
      <g class="needle" transform="rotate(${rot})" stroke="${col}" fill="${col}">
        <line x1="0" y1="26" x2="0" y2="-18" stroke-width="6" stroke-linecap="round"/>
        <path d="M0 -32 L9 -13 L0 -18 L-9 -13 Z"/></g></g></svg>`;
  }
  /* arc-gauge kit indicator (verbatim shape from the shipped _kitArc) */
  function kitArc(kit, sport) {
    const power = kit && kit.power || "no_kit";
    const col = power === "ideal" ? vc("good") : power === "underpowered" ? vc("marg") : power === "overpowered" ? vc("poor") : "var(--mut)";
    const frac = power === "underpowered" ? 0.22 : power === "overpowered" ? 0.78 : 0.5;
    const a = Math.PI * (1 - frac), cx = 50, cy = 56, r = 40;
    const nx = (cx + Math.cos(a) * (r - 6)).toFixed(1), ny = (cy - Math.sin(a) * (r - 6)).toFixed(1);
    const fillEnd = power === "no_kit" ? "M10 56 A40 40 0 0 0 10 56" : `M10 56 A40 40 0 0 1 ${(cx + Math.cos(a) * r).toFixed(1)} ${(cy - Math.sin(a) * r).toFixed(1)}`;
    const size = kit && kit.rig_m2 != null ? `${kit.rig_m2}m²` : "—";
    const label = power === "no_kit" ? "no kit" : power === "ideal" ? "ideal" : power;
    return `<svg viewBox="0 0 100 64" class="kit-svg"><path d="M10 56 A40 40 0 0 1 90 56" class="kit-track"/>
      <path d="${fillEnd}" fill="none" stroke="${col}" stroke-width="9" stroke-linecap="round"/>
      ${power === "no_kit" ? "" : `<line x1="${cx}" y1="${cy}" x2="${nx}" y2="${ny}" class="kit-needle"/>`}
      <circle cx="${cx}" cy="${cy}" r="4" class="kit-hub"/>
      <use href="#${SYM[sport] || "i-kite"}" x="39" y="33" width="22" height="22" fill="none" stroke="${col}" stroke-width="1.6"/></svg>
      <div class="kit-meta"><b style="color:${col}">${size}</b><span>rig · ${label}</span></div>`;
  }
  /* static dark basemap tile mosaic centred on the spot (no JS map dep). CARTO
     dark tiles match the ocean theme; OSM is used by the shipped card in HA. */
  function mapMosaic(lat, lon, zoom = 12) {
    const n = 2 ** zoom, xf = (lon + 180) / 360 * n, lr = lat * Math.PI / 180;
    const yf = (1 - Math.log(Math.tan(lr) + 1 / Math.cos(lr)) / Math.PI) / 2 * n;
    const xt = Math.floor(xf), yt = Math.floor(yf), mx = 256 + (xf - xt) * 256, my = 256 + (yf - yt) * 256;
    const subs = "abcd";
    let imgs = "";
    for (let dy = -1; dy <= 1; dy++) for (let dx = -1; dx <= 1; dx++) {
      const tx = ((xt + dx) % n + n) % n, ty = yt + dy;
      if (ty < 0 || ty >= n) continue;
      const s = subs[(Math.abs(tx + ty)) % 4];
      imgs += `<img alt="" loading="lazy" src="https://${s}.basemaps.cartocdn.com/dark_all/${zoom}/${tx}/${ty}.png" style="left:${(dx + 1) * 256}px;top:${(dy + 1) * 256}px"/>`;
    }
    return `<div class="lmap"><div class="mos" style="margin-left:${(-mx).toFixed(1)}px;margin-top:${(-my).toFixed(1)}px">${imgs}</div></div>`;
  }

  /* ---- per-hour MET series (deterministic): sea-breeze daytime wind, slow
     wave drift, tide level/state read off the modelled curve. ---- */
  const rnd = (n) => { const x = Math.sin(n * 127.1) * 43758.5453; return x - Math.floor(x); };
  const pad2 = (n) => String(n).padStart(2, "0");
  const isoDate = (i) => new Date(2026, 5, 29 + i).toISOString().slice(0, 10);
  function mkTide(state, source, nextType, nextTime, nextLevel, nextIn) {
    const mid = 2.0, amp = 1.5, levels = [];
    for (let i = 0; i < 24; i++) levels.push(+(mid + amp * Math.sin(i / 12.42 * Math.PI * 2 + 1.1)).toFixed(2));
    return { state, source, next: { type: nextType, time: nextTime, level: nextLevel, in_h: nextIn }, levels, min: Math.min(...levels), max: Math.max(...levels) };
  }
  function mkHourlyMet(o) {
    const startHH = parseInt(o.now_time.slice(0, 2), 10), lv = o.tide ? o.tide.levels : null, out = [];
    for (let i = 0; i < 24; i++) {
      const hod = (startHH + i) % 24, day = Math.sin((hod - 9) / 14 * Math.PI);
      const wf = clamp(0.72 + 0.42 * day + (rnd(o.seed + i) * 0.12 - 0.06), 0.4, 1.3);
      const wind = +(o.wind_kn * wf).toFixed(1), gust = +(wind * (1.28 + rnd(o.seed + i + 5) * 0.2)).toFixed(1);
      const dir = Math.round((o.wind_dir + (rnd(o.seed + i + 9) - 0.5) * 34 + 360) % 360);
      const wave = o.wave == null ? null : +Math.max(0.1, o.wave * (0.8 + 0.45 * Math.max(0, day)) * (0.9 + rnd(o.seed + i + 2) * 0.2)).toFixed(1);
      const swell = o.swell == null ? null : +Math.max(0.1, o.swell * (0.92 + rnd(o.seed + i + 4) * 0.16)).toFixed(1);
      const period = o.swellP == null ? null : +(o.swellP * (0.95 + rnd(o.seed + i + 6) * 0.12)).toFixed(1);
      const wt = o.waterT == null ? null : +(o.waterT + Math.sin((hod - 15) / 24 * Math.PI * 2) * 0.8).toFixed(1);
      let tlevel = null, tstate = null;
      if (lv) { const a = lv[hod % 24], b = lv[(hod + 1) % 24]; tlevel = a; tstate = b >= a ? "rising" : "falling"; }
      out.push({ hh: pad2(hod) + ":00", rel: i, wind_kn: wind, gust_kn: gust, wind_dir_deg: dir,
        wave_height_m: wave, swell_height_m: swell, swell_period_s: period, water_temp_c: wt, tide_level: tlevel, tide_state: tstate });
    }
    return out;
  }

  /* ---- the model: factors (0-100) -> weighted score -> kit ---- */
  const SPORT_MODEL = {
    kitesurf: { windy: true, ideal: [15, 30], div: 170, w: { wind: .30, gust: .12, direction: .20, wave: .12, temp: .10, tide: .16 } },
    wingfoil: { windy: true, ideal: [11, 26], div: 95, w: { wind: .30, gust: .12, direction: .18, wave: .12, temp: .10, tide: .18 } },
    windsurf: { windy: true, ideal: [15, 30], div: 120, w: { wind: .32, gust: .10, direction: .20, wave: .12, temp: .10, tide: .16 } },
    surf: { windy: false, w: { wind: .20, wave: .28, swell: .32, temp: .20 } },
    sup: { windy: false, w: { wind: .36, gust: .14, wave: .30, temp: .20 } },
    seaswim: { windy: false, w: { wind: .24, wave: .24, temp: .32, tide: .20 } },
  };
  const angDiff = (a, b) => { let d = Math.abs(a - b) % 360; return d > 180 ? 360 - d : d; };
  const cF = (v) => clamp(Math.round(v), 3, 99);
  const facWind = (kn, lo, hi) => kn < lo ? clamp(40 + kn / lo * 55, 5, 95) : kn <= hi ? clamp(98 - (kn - lo) / (hi - lo) * 6, 80, 98) : clamp(92 - (kn - hi) * 6, 12, 92);
  const facCalm = (kn) => clamp(100 - kn / 22 * 78, 8, 100);
  const facGust = (kn, g) => clamp(100 - (g - kn) * 6, 18, 100);
  const facChop = (m) => clamp(100 - (m || 0) / 1.1 * 72, 15, 100);
  const facWaveSurf = (m) => clamp((m || 0) / 1.3 * 100, 8, 100);
  const facSwell = (m, p) => clamp((m || 0) / 0.9 * 55 + ((p || 4) - 4) * 9, 8, 100);
  const facTemp = (c) => clamp(((c == null ? 14 : c) - 10) / 12 * 100, 5, 100);
  const facTide = (lvl) => clamp(38 + (lvl == null ? 2 : lvl) / 3.5 * 58, 28, 96);
  const facDir = (dir, base, baseFac) => clamp(baseFac - angDiff(dir, base) * 0.7, 20, 99);

  function hourFactors(key, met, baseDir) {
    const M = SPORT_MODEL[key], f = {};
    if (M.windy) {
      f.wind = facWind(met.wind_kn, M.ideal[0], M.ideal[1]);
      f.gust = facGust(met.wind_kn, met.gust_kn);
      f.direction = facDir(met.wind_dir_deg, baseDir, 90);
      f.wave = facChop(met.wave_height_m);
      f.temp = facTemp(met.water_temp_c);
      f.tide = facTide(met.tide_level);
    } else if (key === "surf") {
      f.wind = facCalm(met.wind_kn); f.wave = facWaveSurf(met.wave_height_m);
      f.swell = facSwell(met.swell_height_m, met.swell_period_s); f.temp = facTemp(met.water_temp_c);
    } else {
      f.wind = facCalm(met.wind_kn); f.gust = facGust(met.wind_kn, met.gust_kn);
      f.wave = facChop(met.wave_height_m); f.temp = facTemp(met.water_temp_c); f.tide = facTide(met.tide_level);
    }
    for (const k in f) f[k] = cF(f[k]);
    return f;
  }
  function scoreFrom(f, key) {
    const w = SPORT_MODEL[key].w; let s = 0, tw = 0;
    for (const k in w) if (f[k] != null) { s += f[k] * w[k]; tw += w[k]; }
    return cF(tw ? s / tw : 30);
  }
  function kitFrom(key, kn) {
    const M = SPORT_MODEL[key]; if (!M.windy) return null;
    return { power: kn < M.ideal[0] ? "underpowered" : kn > M.ideal[1] ? "overpowered" : "ideal", rig_m2: clamp(Math.round(M.div / Math.max(6, kn)), 3, 18) };
  }

  function mkSpot(o) {
    const startHH = parseInt(o.now_time.slice(0, 2), 10);
    const met = mkHourlyMet(o);
    const sports = o.sportKeys.map((key) => {
      const hourly = [];
      for (let i = 0; i < 24; i++) {
        const f = hourFactors(key, met[i], o.wind_dir), sc = scoreFrom(f, key);
        hourly.push({ hh: met[i].hh, rel: i, score: sc, verdict: vword(sc), factors: f, kit: kitFrom(key, met[i].wind_kn) });
      }
      let bi = 0; for (let i = 1; i < 24; i++) if (hourly[i].score > hourly[bi].score) bi = i;
      const h0 = hourly[0];
      return {
        sport: key, label: LABELS[key] || key,
        now: { score: h0.score, verdict: h0.verdict, factors: h0.factors, kit: h0.kit },
        best: { hh: hourly[bi].hh, in_hours: bi, score: hourly[bi].score, verdict: hourly[bi].verdict },
        hourly,
      };
    });
    return {
      name: o.name, water_type: o.water_type, latitude: o.lat, longitude: o.lon, now_time: o.now_time,
      current: { wind_dir_deg: o.wind_dir, wind_speed_kn: o.wind_kn, wind_gust_kn: o.gust_kn, wave_height_m: o.wave, swell_height_m: o.swell, swell_period_s: o.swellP, water_temp_c: o.waterT },
      tide: o.tide, daylight: o.daylight, sports, hourly_met: met,
    };
  }

  const SPOTS = [
    mkSpot({ name: "Hurst Spit / Keyhaven", water_type: "sea", lat: 50.715, lon: -1.553, now_time: "13:00", seed: 11,
      wind_dir: 225, wind_kn: 18.4, gust_kn: 24.1, wave: 0.8, swell: 0.6, swellP: 7.2, waterT: 16.5,
      tide: mkTide("rising", "UKHO", "High", "15:42", 3.10, 2.7), daylight: { remaining_min: 392, progress: 0.56, sunset: "21:18", sunrise: "05:08" },
      sportKeys: ["kitesurf", "wingfoil", "windsurf", "surf", "sup", "seaswim"] }),
    mkSpot({ name: "Avon Beach", water_type: "sea", lat: 50.736, lon: -1.733, now_time: "13:00", seed: 37,
      wind_dir: 96, wind_kn: 11.5, gust_kn: 17.2, wave: 0.6, swell: 0.4, swellP: 5.4, waterT: 18.3,
      tide: mkTide("falling", "UKHO", "Low", "14:20", 0.70, 1.3), daylight: { remaining_min: 402, progress: 0.54, sunset: "21:19", sunrise: "05:09" },
      sportKeys: ["wingfoil", "kitesurf", "surf", "seaswim", "sup"] }),
    mkSpot({ name: "Sandbanks", water_type: "sea", lat: 50.687, lon: -1.943, now_time: "13:00", seed: 59,
      wind_dir: 110, wind_kn: 9.0, gust_kn: 15.5, wave: 0.5, swell: 0.35, swellP: 5.0, waterT: 17.5,
      tide: mkTide("rising", "Open-Meteo", "High", "16:05", 2.20, 3.0), daylight: { remaining_min: 410, progress: 0.53, sunset: "21:20", sunrise: "05:10" },
      sportKeys: ["wingfoil", "seaswim", "sup", "kitesurf", "surf"] }),
  ];

  /* sun elevation (-1..1) at rel-hour from now, from the spot's sun times */
  function sunElev(spot, rel) {
    const start = parseInt(spot.now_time, 10);
    const toH = (t) => { const [h, m] = t.split(":").map(Number); return h + m / 60; };
    const sr = toH(spot.daylight.sunrise), ss = toH(spot.daylight.sunset), dl = ss - sr;
    let t = (start + rel) % 24;
    if (t >= sr && t <= ss) return Math.sin(Math.PI * (t - sr) / dl);
    const nt = t < sr ? t + 24 : t;
    return -0.5 * Math.sin(Math.PI * (nt - ss) / ((sr + 24) - ss));
  }

  const FAC_ORDER = ["wind", "gust", "direction", "wave", "swell", "temp", "tide"];
  const FAC_LABEL = { wind: "Wind", gust: "Gust", direction: "Direction", wave: "Wave", swell: "Swell", temp: "Water", tide: "Tide" };
  function facVal(key, met) {
    switch (key) {
      case "wind": return f1(met.wind_kn) + " kn";
      case "gust": return f1(met.gust_kn) + " kn";
      case "direction": return cardOf(met.wind_dir_deg) || "—";
      case "wave": return met.wave_height_m != null ? f1(met.wave_height_m) + " m" : "—";
      case "swell": return met.swell_height_m != null ? f1(met.swell_height_m) + " m" + (met.swell_period_s != null ? " · " + f1(met.swell_period_s) + "s" : "") : "—";
      case "temp": return met.water_temp_c != null ? f1(met.water_temp_c) + "°" : "—";
      case "tide": return cap(met.tide_state) + (met.tide_level != null ? " · " + f1(met.tide_level, 1) + "m" : "");
      default: return "";
    }
  }

  window.SW = { SPOTS, VERDICT, LABELS, SYM, ICON, ICON_DEFS, vc, vcw, cardOf, f1, cap, facCol, ring, compass, kitArc, mapMosaic, sunElev, FAC_ORDER, FAC_LABEL, facVal };
})();
</script>
<script>
/* ============================================================================
   Swelligence — Spot Detail NOW view (Card A · interactive scrubber).
   Self-contained single file: data harness + helpers (window.SW) and the
   scrubber controller. Tap or drag across the 24h outlook to focus any hour;
   the map compass, suitability ring, kit arc, factor breakdown and sun/moon
   marker all follow. Mirror target: Lovelace (HA) + LVGL 9.6 / ESPHome.
   ========================================================================== */
(function () {
  const SW = window.SW, SPOTS = SW.SPOTS;
  const clamp = (v, a, b) => Math.max(a, Math.min(b, v));

  /* ---- shared builders ---- */
  function chrome(spot, sportKey) {
    const meds = spot.sports.map((s) => {
      const sc = s.now.score, col = SW.vcw(s.now.verdict), on = s.sport === sportKey;
      return `<button class="med ${on ? "on" : ""}" data-sport="${s.sport}">
        <div class="med-r">${SW.ring(sc, col, 50, 5)}<div class="med-i">${SW.ICON(s.sport)}<span style="color:${col}">${sc}</span></div></div>
        <div class="med-l">${s.label}</div></button>`;
    }).join("");
    const tabs = SPOTS.map((x, i) => {
      const v = Math.max(...x.sports.map((y) => y.now.score)), on = x === spot;
      return `<button class="tab ${on ? "on" : ""}" data-spot="${i}">
        <div class="tn"><span class="tdot"></span>${x.name}</div>
        <div class="tw"><span>${x.water_type}</span><b>${v}</b></div></button>`;
    }).join("");
    const hdr = `<div class="hdr"><div class="hid"><div class="logo">S</div>
        <div><div class="hnm">${spot.name}</div>
          <div class="hsub"><b>${spot.water_type}</b> · ${spot.latitude.toFixed(3)}, ${spot.longitude.toFixed(3)} · Open-Meteo</div></div></div>
      <div class="hctrl"><div class="hnow"><span class="pulse"></span><div><b>${spot.now_time}</b><span>live</span></div></div>
        <div class="seg"><button class="on">Now</button><button>Week</button></div></div></div>`;
    return { hdr, meds: `<div class="sports">${meds}</div>`, tabs: `<div class="tabs">${tabs}</div>` };
  }
  function barRange(sport, from, to) {
    let s = "";
    for (let i = from; i <= to; i++) { const h = sport.hourly[i]; s += `<button class="bar ${i === 0 ? "now" : ""}" data-hour="${i}" style="--h:${Math.max(6, h.score)}%;--c:${SW.vcw(h.verdict)}"></button>`; }
    return s;
  }

  /* ============================ VARIANT BODIES ============================ */
  function skySvg(spot) {
    const yOf = (e) => (50 - e * 30).toFixed(2), xOf = (r) => (r / 24 * 100).toFixed(2);
    const pts = []; for (let r = 0; r <= 24; r += 0.5) pts.push(`${xOf(r)},${yOf(SW.sunElev(spot, r))}`);
    const start = parseInt(spot.now_time, 10), toH = (t) => { const [h, m] = t.split(":").map(Number); return h + m / 60; };
    const ssRel = ((toH(spot.daylight.sunset) - start) + 24) % 24, srRel = ((toH(spot.daylight.sunrise) - start) + 24) % 24;
    return `<svg class="sky" viewBox="0 0 100 100" preserveAspectRatio="none">
      <line class="sky-horizon" x1="0" y1="${yOf(0)}" x2="100" y2="${yOf(0)}"/>
      <line class="sky-tick" x1="${xOf(ssRel)}" y1="2" x2="${xOf(ssRel)}" y2="98"/>
      <line class="sky-tick" x1="${xOf(srRel)}" y1="2" x2="${xOf(srRel)}" y2="98"/>
      <polyline class="sky-line" points="${pts.join(" ")}"/></svg>`;
  }
  function dayGradient(spot) {
    const start = parseInt(spot.now_time, 10), toH = (t) => { const [h, m] = t.split(":").map(Number); return h + m / 60; };
    const ss = ((toH(spot.daylight.sunset) - start) + 24) % 24 / 24 * 100, sr = ((toH(spot.daylight.sunrise) - start) + 24) % 24 / 24 * 100;
    const day = "rgba(86,194,224,.32)", night = "rgba(9,18,34,.66)", tw = "rgba(246,170,60,.45)";
    return `linear-gradient(90deg,${day} 0%,${day} ${(ss-2.5).toFixed(1)}%,${tw} ${ss.toFixed(1)}%,${night} ${(ss+3).toFixed(1)}%,${night} ${(sr-3).toFixed(1)}%,${tw} ${sr.toFixed(1)}%,${day} ${(sr+2.5).toFixed(1)}%,${day} 100%)`;
  }

  function bodyScrubber(spot, sport) {
    const col = SW.vcw(sport.now.verdict);
    const axis = sport.hourly.map((h, i) => `<span>${i % 3 === 0 ? h.hh.slice(0, 2) : ""}</span>`).join("");
    const facRows = SW.FAC_ORDER.filter((k) => sport.now.factors[k] != null).map((k) =>
      `<div class="fac" data-fac="${k}"><span class="fac-l">${SW.FAC_LABEL[k]}</span><span class="fac-bar"><i></i></span><span class="fac-v" data-fac-v>—</span></div>`).join("");
    const kitHtml = sport.now.kit
      ? SW.kitArc(sport.now.kit, sport.sport)
      : `<div class="bestp"><span class="bp-k">No kit</span><b>best ${sport.best.hh}</b></div>`;
    const start = parseInt(spot.now_time, 10), toH = (t) => { const [h, m] = t.split(":").map(Number); return h + m / 60; };
    const ssX = ((toH(spot.daylight.sunset) - start) + 24) % 24 / 24 * 100, srX = ((toH(spot.daylight.sunrise) - start) + 24) % 24 / 24 * 100;
    return `<div class="body v-scrub">
      <div class="sc-hero">
        <div class="sc-map">
          ${SW.mapMosaic(spot.latitude, spot.longitude)}
          <div class="vign"></div>
          <div class="sc-cmp bodycmp">${SW.compass(spot.current.wind_dir_deg, col, 92)}</div>
          <div class="wband"><div class="wfrom">Wind from <span data-dyn="winddir">—</span></div>
            <div class="wxy"><i data-dyn="wind">—</i> kn · gust <i data-dyn="gust">—</i></div></div>
        </div>
        <div class="sc-readcol">
          <div class="sc-read">
            <div class="sc-cell">
              <div class="sc-cell-k">Suitability</div>
              <div class="scorering">${SW.ring(sport.now.score, col, 78, 8)}<div class="sc-num" data-dyn="score" data-color>—</div></div>
            </div>
            <div class="sc-cell">
              <div class="sc-cell-k">Kit</div>
              <div class="sc-kit" data-kit>${kitHtml}</div>
            </div>
            <div class="sc-cell">
              <div class="sc-cell-k">Safety</div>
              <div class="sc-safety"><svg viewBox="0 0 60 60" class="safety-ph"><circle cx="30" cy="30" r="24"/></svg><span class="ph-note">conditions<br>module</span></div>
            </div>
          </div>
          <div class="sc-facs">${facRows}</div>
        </div>
      </div>
      <div class="chartwrap">
        <div class="ch-h"><span class="k">Outlook · next 24h</span><span class="hint"><b data-dyn="time">--:--</b><span data-dyn="rel">NOW</span></span></div>
        <div class="chart" data-chart>
          <div class="daylane" style="background:${dayGradient(spot)}">
            <span class="dl-lbl">Daylight</span>
            ${skySvg(spot)}
            <span class="dl-t" style="left:${ssX.toFixed(1)}%">↓ ${spot.daylight.sunset}</span>
            <span class="dl-t" style="left:${srX.toFixed(1)}%">↑ ${spot.daylight.sunrise}</span>
            <div class="sunmark"></div>
          </div>
          <div class="barwrap">
            <div class="bars">${barRange(sport, 0, 23)}</div>
          </div>
        </div>
        <div class="axis">${axis}</div>
      </div>
    </div>`;
  }

  /* ============================ CONTROLLER ============================ */
  function mountFrame(el) {
    const st = { spotIdx: 0, sport: null, hour: 0 };
    const refs = () => { const spot = SPOTS[st.spotIdx]; const sport = spot.sports.find((s) => s.sport === st.sport) || spot.sports[0]; st.sport = sport.sport; return { spot, sport }; };

    function render() {
      const { spot, sport } = refs();
      const c = chrome(spot, sport.sport);
      const body = bodyScrubber(spot, sport);
      el.innerHTML = `<div class="card720">${c.hdr}${c.meds}${body}${c.tabs}</div>`;
      paint();
    }
    function paint() {
      const { spot, sport } = refs();
      const met = spot.hourly_met[st.hour], hp = sport.hourly[st.hour], col = SW.vcw(hp.verdict);
      // limiting factor = lowest-scoring factor this hour
      let lk = null, lo = 999; for (const k in hp.factors) if (hp.factors[k] < lo) { lo = hp.factors[k]; lk = k; }
      const limit = lk ? "limited by " + (SW.FAC_LABEL[lk] || lk).toLowerCase() : "";
      const V = {
        time: hp.hh, rel: st.hour === 0 ? "NOW" : "+" + st.hour + "h", verdict: hp.verdict, score: hp.score,
        wind: SW.f1(met.wind_kn), gust: SW.f1(met.gust_kn),
        wave: met.wave_height_m != null ? SW.f1(met.wave_height_m) : "—",
        winddir: SW.cardOf(met.wind_dir_deg) || "—", windsub: SW.cardOf(met.wind_dir_deg) || "",
        gustsub: "peak", wavesub: met.swell_period_s != null ? SW.f1(met.swell_period_s) + " s" : "",
        tidestate: SW.cap(met.tide_state), tidesub: met.tide_level != null ? SW.f1(met.tide_level, 2) + " m" : "",
        watertemp: met.water_temp_c != null ? SW.f1(met.water_temp_c) : "—",
        limit, pos: st.hour === 0 ? "now · " + hp.hh : "+" + st.hour + "h · " + hp.hh,
        note: st.hour === 0 ? (limit || "live conditions") : "modelled · +" + st.hour + "h",
      };
      el.querySelectorAll("[data-dyn]").forEach((n) => { const k = n.dataset.dyn; if (k in V) n.textContent = V[k]; });
      el.querySelectorAll("[data-color]").forEach((n) => { n.style.color = col; });
      el.querySelectorAll("[data-color-bg]").forEach((n) => { n.style.background = col; });
      el.querySelectorAll("[data-hour]").forEach((n) => n.classList.toggle("sel", +n.dataset.hour === st.hour));
      el.querySelectorAll("[data-block]").forEach((n) => n.classList.toggle("on", +n.dataset.block === Math.floor(st.hour / 4)));
      // factor breakdown bars (per hour: score drives the bar, met drives the reading)
      el.querySelectorAll("[data-fac]").forEach((row) => {
        const k = row.dataset.fac, fv = hp.factors[k];
        const bar = row.querySelector(".fac-bar i"); if (bar) { bar.style.width = (fv || 0) + "%"; bar.style.background = SW.facCol(fv); }
        const val = row.querySelector("[data-fac-v]"); if (val) val.textContent = SW.facVal(k, met);
      });
      // kit arc (windy sports only — rebuilt per hour)
      const kitc = el.querySelector("[data-kit]");
      if (kitc && hp.kit) kitc.innerHTML = SW.kitArc(hp.kit, sport.sport);
      const arc = el.querySelector(".scorering .ra");
      if (arc) { const r = +arc.closest(".ringsvg").dataset.r, circ = 2 * Math.PI * r; arc.style.strokeDashoffset = (circ * (1 - hp.score / 100)).toFixed(1); arc.setAttribute("stroke", col); }
      const ndl = el.querySelector(".bodycmp .needle");
      if (ndl) { ndl.setAttribute("transform", `rotate(${((met.wind_dir_deg + 180) % 360)})`); ndl.setAttribute("stroke", col); ndl.setAttribute("fill", col); }
      const sm = el.querySelector(".sunmark");
      if (sm) { const e = SW.sunElev(spot, st.hour + 0.5), day = e >= 0;
        sm.style.left = ((st.hour + 0.5) / 24 * 100).toFixed(2) + "%";
        sm.style.top = (50 - e * 30).toFixed(2) + "%";
        sm.classList.toggle("night", !day); sm.textContent = day ? "☀︎" : "☾"; }
    }
    el.addEventListener("click", (e) => {
      const t = e.target.closest("[data-sport],[data-spot],[data-hour]");
      if (!t) return;
      if (t.dataset.spot != null) { st.spotIdx = +t.dataset.spot; st.sport = null; st.hour = 0; render(); }
      else if (t.dataset.sport != null) { st.sport = t.dataset.sport; st.hour = 0; render(); }
      else if (t.dataset.hour != null) { st.hour = +t.dataset.hour; paint(); }
    });

    {
      let dragging = false;
      const hourAt = (clientX) => { const chart = el.querySelector("[data-chart]"); if (!chart) return st.hour; const r = chart.getBoundingClientRect(); return clamp(Math.floor((clientX - r.left) / r.width * 24), 0, 23); };
      el.addEventListener("pointerdown", (e) => {
        const chart = e.target.closest("[data-chart]"); if (!chart) return;
        dragging = true; chart.setPointerCapture?.(e.pointerId);
        st.hour = hourAt(e.clientX); paint(); e.preventDefault();
      });
      el.addEventListener("pointermove", (e) => { if (!dragging) return; const h = hourAt(e.clientX); if (h !== st.hour) { st.hour = h; paint(); } });
      el.addEventListener("pointerup", () => { dragging = false; });
      el.addEventListener("pointercancel", () => { dragging = false; });
    }

    render();
  }

  window.mountCardA = mountFrame;
})();
</script>
<script>
  document.getElementById("sw-defs").innerHTML = window.SW.ICON_DEFS;
  window.mountCardA(document.getElementById("card"));
</script>
