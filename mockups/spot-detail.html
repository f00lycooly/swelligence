<style>
/* HA theme variables with sensible (dark) fallbacks so the file renders
   standalone; embedded in HA these inherit the active theme. */
:root{
  --primary-text-color:#e1e1e1; --secondary-text-color:#9b9b9b;
  --disabled-text-color:#6f6f6f; --divider-color:rgba(225,225,225,.12);
  --card-background-color:#1c1c1c; --primary-background-color:#111417;
  --secondary-background-color:#202225; --primary-color:#03a9f4;
  --ha-card-border-radius:12px; --ha-card-border-width:1px;
  --ha-card-border-color:var(--divider-color);
  --ha-card-box-shadow:0 2px 6px rgba(0,0,0,.30);
  /* App-semantic verdict palette (not HA vars) */
  --v-epic:#26c6a8; --v-great:#5bbf5b; --v-good:#9ccc40; --v-marginal:#f3b65c; --v-poor:#7d8b93;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Roboto,-apple-system,system-ui,sans-serif;
  background:var(--primary-background-color); color:var(--primary-text-color);
  -webkit-font-smoothing:antialiased; padding:16px; line-height:1.4;
}
.ha-card{
  max-width:480px; margin:0 auto;
  background:var(--card-background-color);
  border-radius:var(--ha-card-border-radius);
  border:var(--ha-card-border-width) solid var(--ha-card-border-color);
  box-shadow:var(--ha-card-box-shadow); overflow:hidden;
}
/* selector */
.selector{display:flex;gap:6px;padding:12px 12px 0;flex-wrap:wrap}
.pill{
  flex:1 1 auto; min-width:90px; cursor:pointer; text-align:center;
  padding:8px 10px; border-radius:10px; border:1px solid var(--divider-color);
  background:var(--secondary-background-color);
}
.pill.active{border-color:var(--primary-color);background:color-mix(in srgb,var(--primary-color) 14%,transparent)}
.pill .pn{display:block;font-weight:600;font-size:14px}
.pill .pw{display:block;font-size:11px;color:var(--secondary-text-color);text-transform:capitalize}
/* header */
.head{padding:14px 16px 6px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.head h1{font-size:20px;font-weight:600;letter-spacing:.2px}
.coords{font-size:12px;color:var(--secondary-text-color);margin-top:2px}
.wt-chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;text-transform:capitalize;
  color:var(--secondary-text-color);border:1px solid var(--divider-color);border-radius:999px;padding:2px 8px}
.wt-chip .dot{width:7px;height:7px;border-radius:50%;background:var(--primary-color)}
.src-chip{font-size:11px;color:var(--secondary-text-color);text-align:right}
.src-chip b{color:var(--primary-text-color)}
.src-chip .stamp{display:block;color:var(--disabled-text-color);margin-top:2px}
/* sections */
.section{padding:8px 16px 14px}
.sec-h{display:flex;align-items:center;gap:8px;margin:10px 0 10px}
.sec-h h2{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1.4px;color:var(--secondary-text-color)}
.sec-h .rule{flex:1;height:1px;background:var(--divider-color)}
/* instruments */
.instruments{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px}
.inst{background:var(--secondary-background-color);border:1px solid var(--divider-color);border-radius:10px;padding:9px 10px}
.inst .k{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--secondary-text-color)}
.inst .v{font-size:20px;font-weight:600;margin-top:1px;display:flex;align-items:center;gap:6px}
.inst .v small{font-size:12px;font-weight:500;color:var(--secondary-text-color)}
.inst .sub{font-size:11px;color:var(--secondary-text-color);margin-top:1px}
.rose{flex:0 0 auto}
.rose svg{width:26px;height:26px;display:block}
/* sports */
.sport{background:var(--secondary-background-color);border:1px solid var(--divider-color);border-radius:12px;padding:12px;margin-bottom:10px}
.sport .top{display:flex;align-items:center;gap:12px}
.ring{position:relative;width:52px;height:52px;flex:0 0 auto}
.ring svg{transform:rotate(-90deg);width:52px;height:52px}
.ring .rt{fill:none;stroke:var(--divider-color);stroke-width:5}
.ring .ra{fill:none;stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset .6s}
.ring .rn{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700}
.sport .nm{font-size:15px;font-weight:600}
.sport .vd{font-size:12px;text-transform:capitalize;font-weight:600}
.sport .sd{margin-left:auto;text-align:right;font-size:11px;color:var(--secondary-text-color)}
.sport .sd b{color:var(--primary-text-color)}
.factors{margin-top:10px;display:grid;gap:5px}
.fac{display:grid;grid-template-columns:64px 1fr 34px;align-items:center;gap:8px;font-size:11px}
.fac .fl{color:var(--secondary-text-color);text-transform:capitalize}
.fac .fb{height:6px;border-radius:3px;background:var(--divider-color);overflow:hidden}
.fac .fb i{display:block;height:100%;border-radius:3px;background:var(--primary-color)}
.fac .fn{text-align:right;color:var(--secondary-text-color);font-variant-numeric:tabular-nums}
.reasons{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.reasons span{font-size:11px;color:var(--secondary-text-color);background:var(--card-background-color);
  border:1px solid var(--divider-color);border-radius:6px;padding:2px 7px}
.flags{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.flag{font-size:10.5px;display:inline-flex;align-items:center;gap:5px;border-radius:6px;padding:2px 8px;border:1px solid}
.flag.nc{color:var(--v-marginal);border-color:color-mix(in srgb,var(--v-marginal) 50%,transparent)}
.flag.md{color:var(--v-poor);border-color:color-mix(in srgb,var(--v-poor) 50%,transparent)}
.nudges{margin-top:8px;display:grid;gap:4px}
.nudge{font-size:11px;color:var(--secondary-text-color);display:flex;gap:6px;align-items:flex-start}
.nudge .i{color:var(--primary-color);flex:0 0 auto}
/* data quality */
.dq-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dq{background:var(--secondary-background-color);border:1px solid var(--divider-color);border-radius:10px;padding:10px}
.dq .k{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--secondary-text-color)}
.dq .v{font-size:15px;font-weight:600;margin-top:2px}
.dq .sub{font-size:11px;color:var(--secondary-text-color);margin-top:1px}
.prov-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;border-bottom:1px solid var(--divider-color)}
.prov-row:last-child{border-bottom:0}
.prov-row .d{color:var(--secondary-text-color);text-transform:capitalize}
.note{font-size:11.5px;color:var(--secondary-text-color);margin-top:10px;display:flex;gap:7px;align-items:flex-start}
.note .i{flex:0 0 auto;color:var(--primary-color)}
.advice-empty{display:flex;gap:8px;align-items:center;font-size:12px;color:var(--secondary-text-color);
  background:var(--secondary-background-color);border:1px solid var(--divider-color);border-radius:10px;padding:10px}
.advice-empty .ic{color:var(--v-great)}
.foot{padding:10px 16px 14px;font-size:10.5px;color:var(--disabled-text-color);text-align:center}
</style>
</head>

</div>

const VERDICT_C = {epic:'var(--v-epic)',great:'var(--v-great)',good:'var(--v-good)',marginal:'var(--v-marginal)',poor:'var(--v-poor)'};
const ICON = {surf:'🏄',kitesurf:'🪁',wingfoil:'🪽',sup:'🧎',sailing:'⛵',seaswim:'🏊',wakeboard_inland:'🎿',wakeboard_sea:'🎿',windsurf:'🏄'};
const COMPASS=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
const WMO={0:'Clear',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Fog',48:'Rime fog',51:'Light drizzle',
  61:'Light rain',63:'Rain',65:'Heavy rain',80:'Showers',95:'Thunderstorm'};
let active=0;

const fmt=(n,d=1)=> n==null?'—':(Math.round(n*10**d)/10**d).toString();
const card=d=> d==null?'':COMPASS[Math.round(((d%360)/22.5))%16];
function rose(d){
  if(d==null) return '';
  return `<span class="rose"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10.5" fill="none" stroke="var(--divider-color)"/>`+
    `<g transform="rotate(${d} 12 12)"><path d="M12 3 L9.6 12.5 L12 11 L14.4 12.5 Z" fill="var(--primary-color)"/>`+
    `<line x1="12" y1="11" x2="12" y2="20" stroke="var(--secondary-text-color)" stroke-width="1.4"/></g></svg></span>`;
}

function instruments(c){
  const t=[];
  const push=(k,v,sub)=> t.push(`<div class="inst"><div class="k">${k}</div><div class="v">${v}</div>${sub?`<div class="sub">${sub}</div>`:''}</div>`);
  if(c.wind_kn!=null) t.push(`<div class="inst"><div class="k">Wind</div><div class="v">${rose(c.wind_dir)}<span>${fmt(c.wind_kn)}<small>kn</small></span></div><div class="sub">gust ${fmt(c.gust_kn)}kn · ${card(c.wind_dir)}</div></div>`);
  if(c.wave_m!=null) push('Wave',`${fmt(c.wave_m)}<small>m</small>`, c.wave_period_s!=null?`period ${fmt(c.wave_period_s)}s`:'');
  if(c.swell_m!=null) push('Swell',`${fmt(c.swell_m)}<small>m</small>`, `${fmt(c.swell_period_s)}s${c.swell_peak_period_s!=null?` · peak ${fmt(c.swell_peak_period_s)}s`:''}${c.swell_dir!=null?` · ${card(c.swell_dir)}`:''}`);
  if(c.wind_wave_m!=null) push('Wind-wave',`${fmt(c.wind_wave_m)}<small>m</small>`, 'local wind-sea');
  if(c.current_kn!=null) push('Current',`${fmt(c.current_kn)}<small>kn</small>`, c.current_dir!=null?`toward ${card(c.current_dir)}`:'');
  if(c.sea_level_m!=null) push('Sea level',`${fmt(c.sea_level_m,2)}<small>m</small>`, 'tidal (model datum)');
  if(c.water_temp_c!=null) push('Water',`${fmt(c.water_temp_c)}<small>°C</small>`, c.air_temp_c!=null?`air ${fmt(c.air_temp_c)}°C`:'');
  else if(c.air_temp_c!=null) push('Air',`${fmt(c.air_temp_c)}<small>°C</small>`, c.apparent_temp_c!=null?`feels ${fmt(c.apparent_temp_c)}°C`:'');
  if(c.weather_code!=null) push('Sky', WMO[c.weather_code]||`code ${c.weather_code}`, c.uv!=null?`UV ${fmt(c.uv,0)}`:'');
  return t.join('');
}

function sportCard(sp){
  const col=VERDICT_C[sp.verdict]||'var(--v-good)';
  const r=23, circ=2*Math.PI*r, off=circ*(1-(sp.score||0)/100);
  const facOrder=['wind','gust','direction','wave','swell','temp','tide','kit'];
  const facs=facOrder.filter(f=>sp.factors[f]!=null).map(f=>
    `<div class="fac"><span class="fl">${f}</span><span class="fb"><i style="width:${sp.factors[f]}%"></i></span><span class="fn">${Math.round(sp.factors[f])}</span></div>`).join('');
  const reasons=(sp.reasons||[]).slice(0,4).map(x=>`<span>${x}</span>`).join('');
  const flags=Object.entries(sp.completeness||{}).map(([k,st])=>
    st==='not_configured'?`<span class="flag nc">⚑ ${k}: not set</span>`:`<span class="flag md">⊘ ${k}: no data</span>`).join('');
  const nudges=(sp.nudges||[]).map(n=>`<div class="nudge"><span class="i">↗</span>${n}</div>`).join('');
  const best=sp.best_in_h!=null?`best <b>+${sp.best_in_h}h</b> · ${Math.round(sp.best_score)}<br>${sp.best_verdict}`:'';
  return `<div class="sport">
    <div class="top">
      <div class="ring"><svg viewBox="0 0 52 52"><circle class="rt" cx="26" cy="26" r="${r}"/>
        <circle class="ra" cx="26" cy="26" r="${r}" stroke="${col}" stroke-dasharray="${circ}" stroke-dashoffset="${off}"/></svg>
        <div class="rn" style="color:${col}">${sp.score==null?'—':Math.round(sp.score)}</div></div>
      <div><div class="nm">${ICON[sp.sport]||''} ${sp.label}</div><div class="vd" style="color:${col}">${sp.verdict||'—'}</div></div>
      <div class="sd">${best}</div>
    </div>
    <div class="factors">${facs}</div>
    ${reasons?`<div class="reasons">${reasons}</div>`:''}
    ${flags?`<div class="flags">${flags}</div>`:''}
    ${nudges?`<div class="nudges">${nudges}</div>`:''}
  </div>`;
}

function render(){
  const s=DATA.spots[active];
  document.getElementById('selector').innerHTML = DATA.spots.map((sp,i)=>
    `<div class="pill ${i===active?'active':''}" onclick="active=${i};render()"><span class="pn">${sp.name}</span><span class="pw">${sp.water_type}</span></div>`).join('');

  const c=s.current;
  const stamp=(c.time||'').replace('T',' ').slice(0,16);
  const nudgeAll = [...new Set(s.sports.flatMap(sp=>sp.nudges||[]))];

  document.getElementById('view').innerHTML = `
    <div class="head">
      <div>
        <span class="wt-chip"><span class="dot"></span>${s.water_type}</span>
        <h1>${s.name}</h1>
        <div class="coords">${s.lat.toFixed(4)}, ${s.lon.toFixed(4)} · ${s.sports.length} sports</div>
      </div>
      <div class="src-chip">source <b>Open-Meteo</b><span class="stamp">${stamp?'captured '+stamp:''}</span></div>
    </div>

    <div class="section">
      <div class="sec-h"><h2>Conditions now</h2><span class="rule"></span></div>
      <div class="instruments">${instruments(c)}</div>
    </div>

    <div class="section">
      <div class="sec-h"><h2>Sports</h2><span class="rule"></span></div>
      ${s.sports.map(sportCard).join('')}
    </div>

    <div class="section">
      <div class="sec-h"><h2>Data quality &amp; completeness</h2><span class="rule"></span></div>
      <div class="dq-grid">
        <div class="dq"><div class="k">Grid cell</div><div class="v">${s.grid_distance_km!=null?fmt(s.grid_distance_km)+' km':'—'}</div><div class="sub">distance to model grid</div></div>
        <div class="dq"><div class="k">Sources</div>${Object.entries(s.sources||{}).map(([d,p])=>`<div class="prov-row"><span class="d">${d}</span><span>${p==='open_meteo'?'Open-Meteo':p}</span></div>`).join('')||'<div class="sub">—</div>'}</div>
      </div>
      ${nudgeAll.length?`<div class="dq" style="margin-top:8px"><div class="k">Tune this spot</div>${nudgeAll.map(n=>`<div class="nudge"><span class="i">↗</span>${n}</div>`).join('')}</div>`:''}
      <div class="note"><span class="i">ⓘ</span>Single forecast source, so cross-model <b>confidence is dormant</b>. It re-activates when Open-Meteo multi-model agreement is wired in (roadmap 48w.1).</div>
      ${s.source_advice&&s.source_advice.length
        ? s.source_advice.map(a=>`<div class="note"><span class="i">↗</span>${a.message||''}</div>`).join('')
        : `<div class="advice-empty"><span class="ic">✓</span>On the best available source for every domain.</div>`}
    </div>`;
}
render();
</script>
