<!-- @dsCard group="Wall panel 720" -->
<!--
  Swelligence — 720×720 wall panel (static mockup; LVGL-translatable spec).

  Kiosk surface, NOT the HA Lovelace card. Rendered in HTML for fidelity, but
  every element maps 1:1 onto an LVGL widget on the real ESPHome/LVGL display:

    score / compass rings .... lv_arc
    factor bars .............. lv_bar
    suitability timeline ..... lv_chart (bar) / row of lv_bar
    tide curve ............... lv_chart (line)
    map ...................... lv_img (static PNG refreshed periodically;
                                       Leaflet used here only for the mock)
    selectors ................ lv_btn (checked) inside lv_flex / lv_grid
    text ..................... lv_label in compiled Montserrat sizes
    wind needle .............. lv_canvas line / baked image

  Designed to answer at a glance: is this NOW, what's the tide doing, and how do
  conditions trend over the next hours / rest of today. Touch-only (no hover,
  ≥64px targets, visible press/selected states); critical info inside a
  centre-safe circle for round 720×720 panels. Onshore/offshore label deferred
  (swelligence-slh.6); multi-day "this week" needs the 7-day fetch (sample=24h).

  DATA injected from real spots by scripts/build_card_data.py between markers.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Swelligence · Wall panel 720</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
:root{
  --bg:#060a0e; --panel:#0d151d; --panel2:#121d27; --raise:#16232e; --press:#1d2f3c;
  --line:rgba(150,178,198,.13); --line-2:rgba(150,178,198,.22);
  --text:#eaf2f6; --muted:#8ba4b3; --dim:#5a7180;
  --teal:#23d5be; --teal-d:#0f8c7e; --cyan:#39bdf8;
  --amber:#f6a623; --danger:#ef5e6b; --rise:#39bdf8; --fall:#f6a623;
  --v0:#6b8190; --v1:#f6a623; --v2:#a7d84a; --v3:#5bd07a; --v4:#23d5be;
  --r:18px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:Montserrat,-apple-system,system-ui,sans-serif;
  background:
    radial-gradient(1100px 700px at 15% -10%, #0c1a22 0%, transparent 60%),
    radial-gradient(900px 600px at 110% 120%, #0a1620 0%, transparent 55%),
    var(--bg);
  color:var(--text); min-height:100%;
  display:flex; align-items:center; justify-content:center; padding:24px;
  font-feature-settings:"tnum" 1; -webkit-font-smoothing:antialiased;
}
.cap{position:fixed;top:14px;left:0;right:0;text-align:center;font-size:11px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--dim)}

.device{
  width:720px;height:720px;flex:0 0 auto;position:relative;border-radius:26px;overflow:hidden;
  background:linear-gradient(180deg,var(--panel) 0%,#0a121a 100%);
  box-shadow:0 0 0 2px #05080b, 0 24px 60px rgba(0,0,0,.6), inset 0 0 0 1px rgba(255,255,255,.03);
}
.panel{position:absolute;inset:0;padding:18px;display:grid;grid-template-rows:52px 1fr 80px;gap:13px}

/* ---- header ---- */
.hdr{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:0 2px}
.hdr .id{display:flex;align-items:center;gap:11px;min-width:0}
.hdr .mono{width:40px;height:40px;border-radius:11px;flex:0 0 auto;display:grid;place-items:center;
  background:radial-gradient(circle at 35% 30%,var(--teal),var(--teal-d));color:#04201c;font-weight:800;font-size:19px;
  box-shadow:0 4px 14px rgba(35,213,190,.28)}
.hdr h1{font-size:24px;font-weight:800;letter-spacing:.2px;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr .wt{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.13em;color:var(--muted);margin-top:4px}
.hdr .wt b{color:var(--teal)}
.hdr .now{display:flex;align-items:center;gap:9px;flex:0 0 auto}
.hdr .now .pulse{width:9px;height:9px;border-radius:50%;background:var(--teal);box-shadow:0 0 0 0 rgba(35,213,190,.6);animation:pulse 2.4s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(35,213,190,.5)}70%{box-shadow:0 0 0 9px rgba(35,213,190,0)}100%{box-shadow:0 0 0 0 rgba(35,213,190,0)}}
.hdr .now .nlab{text-align:right}
.hdr .now .nlab .t{font-size:21px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.hdr .now .nlab .l{font-size:9.5px;font-weight:700;letter-spacing:.22em;color:var(--teal);text-transform:uppercase;margin-top:3px}

/* ---- main split ---- */
.main{display:grid;grid-template-columns:300px 1fr;gap:13px;min-height:0}
.col{min-height:0;display:flex;flex-direction:column;gap:11px}

/* map + compass */
.map-hero{position:relative;height:206px;border-radius:var(--r);overflow:hidden;background:var(--panel2);border:1px solid var(--line)}
.map-hero .lmap{position:absolute;inset:0;z-index:0;background:var(--panel2)}
.map-hero .lmap .leaflet-tile-pane{filter:invert(1) hue-rotate(180deg) brightness(.86) contrast(.95) saturate(.7)}
.map-hero .leaflet-control-attribution{font-size:8px;opacity:.5;background:transparent;color:var(--dim)}
.map-hero .leaflet-control-attribution a{color:var(--muted)}
.map-hero .vign{position:absolute;inset:0;z-index:1;pointer-events:none;box-shadow:inset 0 0 50px 6px rgba(4,8,11,.7)}
.map-hero .wband{position:absolute;left:0;right:0;bottom:0;z-index:2;pointer-events:none;
  padding:20px 14px 9px;display:flex;align-items:flex-end;justify-content:space-between;
  background:linear-gradient(0deg,rgba(4,8,11,.85),transparent)}
.map-hero .wband .wfrom{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.map-hero .wband .wfrom span{color:var(--teal)}
.map-hero .wband .wxy{font-size:10.5px;color:var(--muted)}

/* compass */
.compass{filter:drop-shadow(0 3px 6px rgba(0,0,0,.8))}
.compass .ring{fill:rgba(8,14,19,.52);stroke:var(--line-2);stroke-width:1.6}
.compass .ring2{fill:none;stroke:rgba(35,213,190,.30);stroke-width:1.2;stroke-dasharray:2 5}
.compass .tick{fill:var(--muted);font:700 12px Montserrat,sans-serif;text-anchor:middle}
.compass .tickN{fill:var(--teal)}
.compass .needle{fill:var(--teal);stroke:#06201d;stroke-width:1.2;stroke-linejoin:round}
.compass .tail{fill:rgba(35,213,190,.30)}
.compass .hub{fill:rgba(7,12,17,.92);stroke:var(--line-2);stroke-width:1.5}
.compass .spd{fill:var(--text);font:800 32px Montserrat,sans-serif;text-anchor:middle}
.compass .unit{fill:var(--muted);font:700 11px Montserrat,sans-serif;text-anchor:middle;letter-spacing:.1em}
.compass .gust{fill:var(--amber);font:700 12px Montserrat,sans-serif;text-anchor:middle}
.compass.calm .needle,.compass.calm .tail{display:none}
.compass .calm-dot{display:none}.compass.calm .calm-dot{display:block;fill:var(--muted)}
.compass.calm .spd{font-size:21px}

/* tide module */
.tide{flex:1;min-height:0;background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);
  border-radius:var(--r);padding:13px 15px;display:flex;flex-direction:column}
.tide .th{display:flex;align-items:center;justify-content:space-between}
.tide .th .k{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:var(--muted)}
.tide .th .model{font-size:8.5px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);
  border:1px solid var(--line);border-radius:6px;padding:2px 6px}
.tide .state{display:flex;align-items:baseline;gap:10px;margin-top:7px}
.tide .state .arrow{font-size:23px;line-height:1}
.tide .state .word{font-size:23px;font-weight:800;letter-spacing:.5px}
.tide.rising .arrow,.tide.rising .word{color:var(--rise)}
.tide.falling .arrow,.tide.falling .word{color:var(--fall)}
.tide.slack .word{color:var(--muted)}
.tide .nxt{font-size:12px;color:var(--muted);margin-top:5px}
.tide .nxt b{color:var(--text);font-weight:800}
.tide .curve{flex:1;min-height:0;margin-top:8px;position:relative}
.tide .curve svg{position:absolute;inset:0;width:100%;height:100%}
.tide .cpath{fill:none;stroke:var(--teal);stroke-width:2;stroke-linejoin:round}
.tide .cfill{fill:rgba(35,213,190,.10)}
.tide .cnow{stroke:var(--text);stroke-width:1.4;stroke-dasharray:3 3;opacity:.7}
.tide .cdot{fill:var(--amber)}
.tide .cnowdot{fill:var(--text)}
.tide .clab{fill:var(--dim);font:700 9px Montserrat,sans-serif}

/* ---- sports column ---- */
.sportwrap{min-height:0;display:flex;flex-direction:column;gap:11px}
/* sport pills (touch selector) */
.pills{display:grid;grid-auto-flow:column;grid-auto-columns:1fr;gap:8px}
.pill{cursor:pointer;min-height:50px;border-radius:13px;border:1px solid var(--line);background:var(--panel2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:5px 4px;
  transition:background .12s,border-color .12s}
.pill:active{background:var(--press)}
.pill.on{border-color:var(--teal);background:linear-gradient(180deg,rgba(35,213,190,.12),var(--panel2))}
.pill .pn{font-size:12px;font-weight:700;white-space:nowrap}
.pill .ps{font-size:14px;font-weight:800;font-variant-numeric:tabular-nums}

/* selected sport head */
.sel{display:flex;align-items:center;gap:15px;background:linear-gradient(180deg,var(--raise),var(--panel2));
  border:1px solid var(--line-2);border-radius:16px;padding:13px 15px}
.gauge{position:relative;width:80px;height:80px;flex:0 0 auto}
.gauge svg{width:80px;height:80px;transform:rotate(-90deg)}
.gauge .gt{fill:none;stroke:rgba(150,178,198,.16);stroke-width:8}
.gauge .ga{fill:none;stroke-width:8;stroke-linecap:round}
.gauge .gn{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.gauge .gn b{font-size:27px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.gauge .gn i{font-size:8.5px;font-style:normal;text-transform:uppercase;letter-spacing:.16em;color:var(--teal);margin-top:1px}
.sel .nm{font-size:20px;font-weight:800}
.sel .vd{font-size:12.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-top:2px}
.sel .best{margin-left:auto;text-align:right}
.sel .best .bk{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--dim)}
.sel .best .bt{font-size:18px;font-weight:800;margin-top:2px;font-variant-numeric:tabular-nums}
.sel .best .bs{font-size:11px;color:var(--muted);margin-top:1px}

/* suitability timeline */
.tl{background:var(--panel2);border:1px solid var(--line);border-radius:16px;padding:11px 13px 9px;display:flex;flex-direction:column}
.tl .tlh{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.tl .tlh .k{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.14em;color:var(--muted)}
.tl .tlh .span{font-size:9.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);
  border:1px solid var(--line);border-radius:6px;padding:2px 7px}
/* 24h ⇄ Week toggle (touch) */
.tl .seg{display:flex;gap:0;border:1px solid var(--line-2);border-radius:9px;overflow:hidden}
.tl .seg button{cursor:pointer;font-family:inherit;border:0;background:transparent;color:var(--muted);
  font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;padding:7px 13px;min-height:32px}
.tl .seg button:active{background:var(--press)}
.tl .seg button.on{background:var(--teal);color:#04201c}
/* weekly bars */
.wk{display:flex;gap:6px;height:78px}
.wd{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:0}
.wd .num{font-size:11px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
.wd .num .star{color:var(--amber)}
.wd .track{flex:1;width:100%;display:flex;align-items:flex-end;background:rgba(150,178,198,.12);border-radius:6px;overflow:hidden}
.wd .fill{width:100%;border-radius:6px 6px 0 0;min-height:3px}
.wd .dow{font-size:9.5px;font-weight:700;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.wd.today .dow{color:var(--teal)}
.wd .bt{font-size:8px;color:var(--dim);font-variant-numeric:tabular-nums}
.tl .bars{display:flex;align-items:flex-end;gap:2px;height:78px}
.tl .b{flex:1;position:relative;border-radius:3px 3px 0 0;min-height:3px;align-self:flex-end}
.tl .b.now::after{content:"NOW";position:absolute;top:-13px;left:50%;transform:translateX(-50%);
  font-size:7.5px;font-weight:800;letter-spacing:.08em;color:var(--text);white-space:nowrap}
.tl .b.best::before{content:"★";position:absolute;top:-14px;left:50%;transform:translateX(-50%);
  font-size:11px;color:var(--amber)}
.tl .axis{display:flex;margin-top:6px}
.tl .axis .x{flex:1;text-align:center;font-size:9px;font-weight:600;color:var(--dim);font-variant-numeric:tabular-nums}
.tl .none{height:78px;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:12px}

/* now conditions strip + factors */
.now-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.ns{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:8px 10px}
.ns .k{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted)}
.ns .v{font-size:18px;font-weight:800;margin-top:2px;font-variant-numeric:tabular-nums}
.ns .v small{font-size:10px;font-weight:600;color:var(--muted)}
.ns.amber .v{color:var(--amber)}
.facs{flex:1;min-height:0;display:grid;gap:6px;align-content:center}
.fac{display:grid;grid-template-columns:70px 1fr 30px;align-items:center;gap:9px;font-size:10.5px}
.fac .fl{color:var(--muted);text-transform:capitalize;font-weight:600}
.fac .fb{height:6px;border-radius:4px;background:rgba(150,178,198,.14);overflow:hidden}
.fac .fb i{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--teal-d),var(--teal))}
.fac .fn{text-align:right;color:var(--muted);font-weight:700;font-variant-numeric:tabular-nums}

/* ---- bottom spot tabs ---- */
.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
.tab{cursor:pointer;border-radius:16px;padding:11px 15px;display:flex;flex-direction:column;justify-content:center;gap:4px;
  background:var(--panel2);border:1px solid var(--line);transition:background .12s,border-color .12s,box-shadow .12s}
.tab:active{background:var(--press)}
.tab.on{border-color:var(--teal);background:linear-gradient(180deg,rgba(35,213,190,.12),var(--panel2));
  box-shadow:0 0 0 1px rgba(35,213,190,.35),0 8px 22px rgba(35,213,190,.12)}
.tab .tn{font-size:17px;font-weight:800;display:flex;align-items:center;gap:8px}
.tab .tdot{width:8px;height:8px;border-radius:50%;background:var(--muted)}
.tab.on .tdot{background:var(--teal);box-shadow:0 0 8px var(--teal)}
.tab .tw{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);
  display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.tab .tw b{font-size:14px;font-weight:800;color:var(--text);font-variant-numeric:tabular-nums}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>

const fmt=(n,d=1)=> n==null?'—':(Math.round(n*10**d)/10**d).toString();

function compass(dir,kn,gust){
  const calm=kn==null||dir==null, flow=dir==null?0:(dir+180)%360;
  const op=calm?0:Math.max(.55,Math.min(1,kn/14));
  return `<svg class="compass ${calm?'calm':''}" viewBox="0 0 200 200" width="200" height="200">
    <circle class="ring" cx="100" cy="100" r="80"/><circle class="ring2" cx="100" cy="100" r="71"/>
    <text class="tick tickN" x="100" y="26">N</text><text class="tick" x="100" y="182">S</text>
    <text class="tick" x="180" y="105">E</text><text class="tick" x="20" y="105">W</text>
    <g transform="rotate(${flow} 100 100)" style="opacity:${op}">
      <polygon class="tail" points="100,118 108,150 100,140 92,150"/>
      <polygon class="needle" points="100,26 111,116 100,102 89,116"/></g>
    <circle class="hub" cx="100" cy="100" r="40"/><circle class="calm-dot" cx="100" cy="100" r="6"/>
    ${calm?`<text class="spd" x="100" y="107">Calm</text>`
      :`<text class="spd" x="100" y="97">${fmt(kn)}</text><text class="unit" x="100" y="113">KN</text>
        ${gust!=null?`<text class="gust" x="100" y="132">G ${fmt(gust)}</text>`:''}`}
  </svg>`;
}
function ring(score,col,s,sw){const r=s/2-sw,circ=2*Math.PI*r,off=circ*(1-(score||0)/100);
  return `<svg viewBox="0 0 ${s} ${s}"><circle class="gt" cx="${s/2}" cy="${s/2}" r="${r}" style="stroke-width:${sw}"/>`+
   `<circle class="ga" cx="${s/2}" cy="${s/2}" r="${r}" stroke="${col}" style="stroke-width:${sw}" stroke-dasharray="${circ}" stroke-dashoffset="${off}"/></svg>`;}

// Tide module — state + next high/low + a 24h modelled sea-level curve.
function tideModule(s){
  const t=s.tide;
  if(!t) return `<div class="tide slack"><div class="th"><span class="k">Tide</span></div><div class="nxt">no tide model</div></div>`;
  const arrow=t.state==='rising'?'▲':t.state==='falling'?'▼':'—';
  const nx=t.next;
  const lv=t.levels, n=lv.length, lo=t.min, hi=t.max, rng=(hi-lo)||1;
  const W=268,H=86;
  const X=i=>i/(n-1)*W, Y=v=>v==null?H/2:H-6-((v-lo)/rng)*(H-12);
  let dpath='';
  lv.forEach((v,i)=>{ if(v==null) return; dpath+=(dpath?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1)+' ';});
  const fillp=`M0 ${H} L`+lv.map((v,i)=>X(i).toFixed(1)+' '+Y(v).toFixed(1)).join(' L')+` L${W} ${H} Z`;
  const nowX=X(0), nxX=nx?X(nx.in_h):null, nxY=nx?Y(nx.level):null;
  // sparse hour labels (every 6h)
  let labs='';
  for(let i=0;i<n;i+=6){ labs+=`<text class="clab" x="${X(i)+2}" y="${H-1}">${s.hours[i]||''}</text>`; }
  return `<div class="tide ${t.state}">
    <div class="th"><span class="k">Tide</span><span class="model">${t.source||'modelled'}</span></div>
    <div class="state"><span class="arrow">${arrow}</span><span class="word">${t.state}</span></div>
    <div class="nxt">${nx?`next <b>${nx.type}</b> at <b>${nx.time}</b> <span style="color:var(--dim)">(+${nx.in_h}h · ${fmt(nx.level,2)}m)</span>`:'between turning points'}</div>
    <div class="curve"><svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <path class="cfill" d="${fillp}"/><path class="cpath" d="${dpath}"/>
      <line class="cnow" x1="${nowX}" y1="2" x2="${nowX}" y2="${H-2}"/>
      <circle class="cnowdot" cx="${nowX}" cy="${Y(lv[0])}" r="3"/>
      ${nx?`<circle class="cdot" cx="${nxX}" cy="${nxY}" r="3.5"/>`:''}
      ${labs}
    </svg></div>
  </div>`;
}

// Suitability outlook for the selected sport — toggles between the next-24h
// hourly timeline (anchored at NOW) and the 7-day weekly peaks. LVGL: a tab
// view (lv_tabview) or a checked button pair swapping the lv_chart series.
let tlMode='hours';
function setTL(m){ tlMode=m; render(); }
function outlook(sp,s){
  const ser=sp.series, daily=sp.daily;
  const toggle=`<div class="seg">
    <button class="${tlMode==='hours'?'on':''}" onclick="setTL('hours')">24h</button>
    <button class="${tlMode==='week'?'on':''}" onclick="setTL('week')">Week</button></div>`;
  if(tlMode==='week'){
    if(!daily||!daily.length) return `<div class="tl"><div class="tlh"><span class="k">Outlook</span>${toggle}</div><div class="none">no daily forecast</div></div>`;
    const peak=Math.max(...daily.map(e=>e.s));
    const bars=daily.map(e=>`<div class="wd ${e.d==='Today'?'today':''}">
        <div class="num">${e.s===peak?'<span class="star">★</span>':''}${e.s}</div>
        <div class="track"><div class="fill" style="height:${Math.max(4,e.s)}%;background:${VC[e.v]}"></div></div>
        <div class="dow">${e.d}</div><div class="bt">${e.t}</div></div>`).join('');
    return `<div class="tl"><div class="tlh"><span class="k">Outlook · daily peak</span>${toggle}</div><div class="wk">${bars}</div></div>`;
  }
  if(!ser||!ser.length) return `<div class="tl"><div class="tlh"><span class="k">Outlook</span>${toggle}</div><div class="none">no hourly forecast for this sport</div></div>`;
  const n=ser.length, bestI=sp.best_in_h;
  const bars=ser.map((p,i)=>{const sc=p[0]==null?0:p[0];
    return `<div class="b ${i===0?'now':''} ${i===bestI?'best':''}" style="height:${Math.max(6,sc)}%;background:${VC[p[1]]}" title="${s.hours[i]} · ${sc}"></div>`;}).join('');
  let axis='';
  for(let i=0;i<n;i++){ axis+=`<div class="x">${i%6===0?(s.hours[i]||''):''}</div>`; }
  return `<div class="tl">
    <div class="tlh"><span class="k">Outlook · suitability</span>${toggle}</div>
    <div class="bars">${bars}</div>
    <div class="axis">${axis}</div>
  </div>`;
}

function nowStrip(c){
  const wc=card(c.wind_dir);
  const cell=(amber,k,v,sub)=>`<div class="ns ${amber?'amber':''}"><div class="k">${k}</div><div class="v">${v}${sub?`<small> ${sub}</small>`:''}</div></div>`;
  return cell(false,'Wind',`${fmt(c.wind_kn)}`,`kn ${wc||''}`)
    + cell(true,'Gust',`${fmt(c.gust_kn)}`,'kn')
    + cell(false,'Wave',`${c.wave_m!=null?fmt(c.wave_m):(c.wind_wave_m!=null?fmt(c.wind_wave_m):'—')}`,'m')
    + cell(false,'Swell',`${c.swell_m!=null?fmt(c.swell_m):'—'}`,c.swell_period_s!=null?fmt(c.swell_period_s)+'s':'m');
}

function render(){
  const s=DATA.spots[aSpot];
  if(aSport>=s.sports.length) aSport=0;
  const c=s.current, sp=s.sports[aSport];
  const col=VC[VBYNAME[sp.verdict]??2], wc=card(c.wind_dir);
  const facOrder=['wind','gust','direction','wave','swell','temp','tide','kit'];
  const facs=facOrder.filter(f=>sp.factors[f]!=null).map(f=>
    `<div class="fac"><span class="fl">${f}</span><span class="fb"><i style="width:${sp.factors[f]}%"></i></span><span class="fn">${Math.round(sp.factors[f])}</span></div>`).join('');
  const bestT=sp.best_time||(sp.best_in_h!=null?'+'+sp.best_in_h+'h':'—');

  document.getElementById('panel').innerHTML=`
    <div class="hdr">
      <div class="id"><div class="mono">S</div>
        <div><h1>${s.name}</h1><div class="wt"><b>${s.water_type}</b> · ${s.lat.toFixed(3)}, ${s.lon.toFixed(3)} · Open-Meteo</div></div></div>
      <div class="now"><span class="pulse"></span><div class="nlab"><div class="t">${s.now_time||'--:--'}</div><div class="l">Now</div></div></div>
    </div>

    <div class="main">
      <div class="col">
        <div class="map-hero"><div class="lmap" id="lmap"></div><div class="vign"></div>
          <div class="wband"><div class="wfrom">${wc?`Wind from <span>${wc}</span>`:'Calm'}</div>
            <div class="wxy">${c.wind_kn!=null?fmt(c.wind_kn)+' kn':''}${c.gust_kn!=null?' · gust '+fmt(c.gust_kn):''}</div></div></div>
        ${tideModule(s)}
      </div>

      <div class="col sportwrap">
        <div class="pills">${s.sports.map((x,i)=>{const sc=VC[VBYNAME[x.verdict]??2];
          return `<div class="pill ${i===aSport?'on':''}" onclick="aSport=${i};render()"><span class="pn">${x.label}</span><span class="ps" style="color:${sc}">${x.score==null?'—':Math.round(x.score)}</span></div>`;}).join('')}</div>

        <div class="sel">
          <div class="gauge">${ring(sp.score,col,80,8)}<div class="gn"><b style="color:${col}">${sp.score==null?'—':Math.round(sp.score)}</b><i>now</i></div></div>
          <div><div class="nm">${sp.label}</div><div class="vd" style="color:${col}">${sp.verdict||'—'}</div></div>
          <div class="best"><div class="bk">Best · next 24h</div><div class="bt">${bestT}</div><div class="bs">${sp.best_score!=null?Math.round(sp.best_score)+' · '+(sp.best_verdict||''):''}</div></div>
        </div>

        ${outlook(sp,s)}
        <div class="now-strip">${nowStrip(c)}</div>
        <div class="facs">${facs}</div>
      </div>
    </div>

    <div class="tabs">
      ${DATA.spots.map((x,i)=>{const top=Math.max(...x.sports.map(y=>y.score||0));
        return `<div class="tab ${i===aSpot?'on':''}" onclick="aSpot=${i};aSport=0;render()">
          <div class="tn"><span class="tdot"></span>${x.name}</div>
          <div class="tw"><span>${x.water_type}</span><b>${Math.round(top)}</b></div></div>`;}).join('')}
    </div>`;

  initMap(s,c);
}

function initMap(s,c){
  const el=document.getElementById('lmap');
  if(!el||!window.L||s.lat==null||s.lon==null) return;
  if(window._lmap){window._lmap.remove();window._lmap=null;}
  const map=L.map(el,{zoomControl:false,attributionControl:true,dragging:false,scrollWheelZoom:false,
    doubleClickZoom:false,boxZoom:false,keyboard:false,touchZoom:false,tap:false}).setView([s.lat,s.lon],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
  const icon=L.divIcon({className:'',html:compass(c.wind_dir,c.wind_kn,c.gust_kn),iconSize:[200,200],iconAnchor:[100,100]});
  L.marker([s.lat,s.lon],{icon,interactive:false,keyboard:false}).addTo(map);
  window._lmap=map; setTimeout(()=>map.invalidateSize(),0);
}
render();
</script>
</body>
</html>
